<!doctype html>
<head>
  <meta charset="utf-8" />
  <title>GRENADE</title>
  <link
    rel="stylesheet"
    href="{{url_for('static',filename='css/style.css')}}"
  />
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search); //recuperer "le nom" de la série dans l'URL
      const q = params.get("q");
      const decoded = decodeURIComponent(q); //url -> nom
      //pré-remplir
      if (q) {
        document.addEventListener("DOMContentLoaded", function () {
          const input = document.getElementById("search-input");
          if (input) {
            input.value = decoded;
          }
        });
      }
    })();
  </script>
  <script src="{{url_for('static',filename='js/search.js')}}" defer></script>
</head>
<body class="gradient">
  <header>
    <h3 id="home-page">GRENADE</h3>
    <nav>
      <a href="{{ url_for('listeseries.listeseries_test') }}">Mes séries</a>
      <a href="{{ url_for('recommendations.recommendation_test') }}"
        >Recommendations</a
      >
      <a href="{{ url_for('auth.logout') }}">Déconnexion</a>
    </nav>
  </header>
  <main>
    <form>
      <div class="form">
        <div class="input">
          <input
            type="text"
            id="search-input"
            placeholder="Tape le nom d'une série…"
            class="search-input"
          />
        </div>
      </div>
      <button id="search-button">Rechercher</button>
    </form>
    <p style="margin-left: 50px">Mes séries annotés</p>
    <div id="series-container"></div>
  </main>
  <footer></footer>
</body>
