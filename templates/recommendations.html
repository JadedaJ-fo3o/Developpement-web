<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>GRENADE - Recommendations</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script
      src="{{ url_for('static', filename='js/recommendation.js') }}"
      defer
    ></script>
  </head>

  <body class="gradient">
    <header>
      <a
        href="{{ url_for('home') }}"
        id="home-logo-link"
        style="text-decoration: none; color: white"
      >
        <h3 id="home-logo-text">GRENADE</h3>
      </a>

      <nav>
        <a href="{{ url_for('listeseries.listeseries_test') }}">Mes séries</a>
        <a href="{{ url_for('recommendations.recommendation_test') }}"
          >Recommendations</a
        >
        <a href="{{ url_for('auth.logout') }}">Déconnexion</a>
      </nav>
    </header>

    <main id="recommendation-main">
      <article id="recommendation-center-box">
        <form id="recommendation-form">
          <div id="recommendation-input-shell">
            <textarea
              id="recommendation-input"
              placeholder="Décrivez ce que vous voulez regarder..."
              required
            ></textarea>

            <button
              type="submit"
              id="recommendation-submit-button"
              title="Envoyer la demande de recommandation"
            >
              ↑
            </button>
          </div>
        </form>

        <!-- Note d'information -->
        <p id="recommendation-scope-note" class="info-note">
          Recommandations basées sur TVMaze (séries TV uniquement), avec un
          maximum de 5 résultats.
        </p>

        <!-- Conteneur des résultats -->
        <div id="recommendation-result-container" class="result-box">
          <!-- Les résultats s'affichent ici -->
        </div>

        <p
          id="recommendation-error"
          class="error-message"
          style="display: none"
        ></p>
      </article>
    </main>

    <footer></footer>
  </body>
</html>
