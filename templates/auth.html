<!DOCTYPE html>
<html>
<head>
    <title>GenFlix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="main-container">
        <h1>GEN<span>FLIX</span></h1>
        
        <div id="form_connect">
            <h2>Connexion</h2>
            <form>
                <input type="text" name="user">
                <input type="password" name="pass">
                <button type="submit">Se connecter</button>
            </form>
            <p>Si vous n'avez pas de compte, vous voulez le créer ? <a href="#" onclick="inscrire()">S'inscrire</a></p>
        </div>

        <div id="form_inscrire" style="display:none;">
            <h2>Inscription</h2>
            <form>
                <input type="text" name="user">
                <input type="password" name="pass">
                <button type="submit">Créer mon compte</button>
            </form>
            <p>Vous avez déjà un compte ? <a href="#" onclick="connect()">Se connecter</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
